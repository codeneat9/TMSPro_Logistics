<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>TMS Pro - AI Route Optimization & Delay Prediction</title>
    
    <!-- Leaflet Map Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            scroll-behavior: smooth;
        }

        :root {
            --bg-main: #08101c;
            --bg-secondary: #10233d;
            --panel-bg: rgba(12, 25, 44, 0.88);
            --panel-border: #2d4f7f;
            --panel-border-soft: rgba(120, 163, 221, 0.28);
            --text-primary: #ecf5ff;
            --text-muted: #adc2e2;
            --text-subtle: #89a2c8;
            --accent-blue: #2f8eff;
            --accent-cyan: #00d2c7;
            --accent-lime: #6de884;
            --accent-amber: #ffc562;
            --surface: rgba(18, 34, 58, 0.92);
            --surface-2: rgba(13, 28, 50, 0.94);
            --input-bg: rgba(5, 15, 30, 0.97);
            --ok: #1fd88b;
            --warn: #f8b84a;
            --danger: #f66768;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-soft: 0 16px 38px rgba(2, 10, 24, 0.44);
            --shadow-hard: 0 26px 68px rgba(1, 7, 19, 0.64);
        }

        body {
            font-family: 'Sora', 'Segoe UI', sans-serif;
            background:
                radial-gradient(1200px 700px at -10% 110%, rgba(22, 140, 255, 0.22), transparent 70%),
                radial-gradient(1000px 520px at 120% -10%, rgba(16, 214, 198, 0.18), transparent 72%),
                linear-gradient(145deg, var(--bg-main) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            overflow: hidden;
            letter-spacing: 0.01em;
            text-rendering: geometricPrecision;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(147, 180, 223, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(147, 180, 223, 0.06) 1px, transparent 1px);
            background-size: 38px 38px;
            mask-image: radial-gradient(circle at 40% 40%, black, transparent 78%);
            z-index: 0;
        }

        .app-container {
            display: grid;
            grid-template-columns: minmax(400px, 440px) 1fr;
            height: 100vh;
            gap: 0;
            position: relative;
            z-index: 1;
        }

        /* ===== LEFT SIDEBAR ===== */
        .left-panel {
            background: linear-gradient(180deg, rgba(13, 25, 45, 0.88) 0%, rgba(8, 18, 34, 0.9) 100%);
            border-right: 1px solid var(--panel-border-soft);
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-hard);
            backdrop-filter: blur(12px);
            z-index: 100;
            transition: box-shadow 0.3s ease;
            border-top-right-radius: 16px;
            border-bottom-right-radius: 16px;
        }

        .panel-header {
            background:
                linear-gradient(135deg, rgba(22, 137, 255, 0.96) 0%, rgba(0, 198, 188, 0.9) 55%, rgba(50, 124, 255, 0.96) 100%);
            color: white;
            padding: 30px 24px;
            text-align: center;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(212, 242, 255, 0.35);
            box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .panel-header::before {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            right: -70px;
            top: -120px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.02) 72%);
            pointer-events: none;
        }

        .panel-header h1 {
            font-size: clamp(38px, 5vw, 54px);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1.8px;
            line-height: 1;
            text-shadow: 0 8px 20px rgba(6, 37, 71, 0.35);
            position: relative;
            z-index: 1;
        }

        .panel-header p {
            font-size: 12px;
            opacity: 0.92;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            position: relative;
            z-index: 1;
        }

        .panel-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(180deg, rgba(10, 19, 35, 0.78) 0%, rgba(8, 15, 28, 0.82) 100%);
        }

        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .panel-content::-webkit-scrollbar-track {
            background: rgba(23, 35, 62, 0.6);
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: rgba(113, 138, 189, 0.8);
            border-radius: 3px;
        }

        /* Section Styling */
        .form-section {
            margin-bottom: 0;
            background: linear-gradient(180deg, rgba(17, 31, 53, 0.86) 0%, rgba(12, 24, 42, 0.9) 100%);
            border: 1px solid rgba(119, 154, 206, 0.22);
            border-radius: var(--radius-lg);
            padding: 14px 14px 12px;
            box-shadow: var(--shadow-soft);
            position: relative;
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            animation: riseIn 0.28s ease both;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section:hover {
            border-color: rgba(128, 182, 255, 0.42);
            box-shadow: 0 16px 34px rgba(3, 14, 33, 0.44);
        }

        .form-section::after {
            content: '';
            position: absolute;
            right: -60px;
            top: -50px;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(48, 157, 255, 0.15) 0%, transparent 72%);
            pointer-events: none;
        }

        .form-section-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #a9c8f2;
            margin-bottom: 12px;
            letter-spacing: 1.4px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* Location Inputs */
        .location-block {
            margin-bottom: 14px;
        }

        .location-label {
            font-size: 12px;
            font-weight: 600;
            color: #b4c8e7;
            margin-bottom: 6px;
            display: block;
        }

        .location-coords {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
            align-items: stretch;
        }

        .coord-input {
            padding: 10px;
            border: 1px solid rgba(90, 121, 175, 0.7);
            border-radius: 12px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-primary);
            font-weight: 600;
            min-height: 42px;
            width: 100%;
            line-height: 1.2;
            box-shadow: inset 0 1px 0 rgba(167, 205, 255, 0.08);
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            opacity: 0.35;
        }

        .coord-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(17, 205, 230, 0.2);
        }

        .preset-btn {
            width: 100%;
            background: linear-gradient(120deg, rgba(41, 66, 122, 0.9) 0%, rgba(47, 89, 168, 0.9) 100%);
            border: 1px solid rgba(123, 164, 255, 0.5);
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #dbe7ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            transform: translateY(-1px);
            border-color: var(--accent-cyan);
            box-shadow: 0 8px 18px rgba(32, 140, 255, 0.28);
        }

        .map-select-btn {
            width: 100%;
            background: linear-gradient(135deg, rgba(28, 53, 94, 0.9) 0%, rgba(18, 39, 72, 0.92) 100%);
            border: 1px solid rgba(125, 161, 228, 0.58);
            color: #ecf6ff;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            letter-spacing: 0.02em;
        }

        .map-select-btn:hover {
            border-color: #6ed6ff;
            box-shadow: 0 10px 22px rgba(38, 152, 255, 0.28);
            transform: translateY(-1px);
        }

        .map-select-btn.active {
            background: linear-gradient(120deg, #1776d9 0%, #0fa5b5 100%);
            border-color: #b2eeff;
            box-shadow: 0 10px 22px rgba(9, 113, 224, 0.4);
        }

        /* Trip Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            align-items: stretch;
        }

        .detail-field {
            display: flex;
            flex-direction: column;
        }

        .detail-field label {
            font-size: 11px;
            font-weight: 700;
            color: #afc3e3;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .detail-field input,
        .detail-field select {
            padding: 8px;
            border: 1px solid #2c3a5d;
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-primary);
            min-height: 42px;
            width: 100%;
            line-height: 1.2;
            box-shadow: inset 0 1px 0 rgba(167, 205, 255, 0.08);
        }

        .detail-field {
            min-width: 0;
        }

        .detail-field input:focus,
        .detail-field select:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(49, 216, 255, 0.16);
        }

        /* Plan Trip Button */
        .plan-button {
            width: 100%;
            background: linear-gradient(135deg, #2277ff 0%, #00bcd6 60%, #19c57f 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-lg);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0;
            box-shadow: 0 14px 28px rgba(14, 119, 226, 0.42);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            min-height: 48px;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
        }

        .plan-button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 35%, rgba(255, 255, 255, 0.22) 48%, transparent 62%);
            transform: translateX(-130%);
            transition: transform 0.8s ease;
        }

        .plan-button:hover::after {
            transform: translateX(130%);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .nav-settings {
            margin-top: 10px;
        }

        .alerts-panel {
            margin-top: 10px;
            background: linear-gradient(180deg, rgba(14, 27, 47, 0.9) 0%, rgba(10, 20, 36, 0.92) 100%);
            border: 1px solid rgba(112, 146, 200, 0.26);
            border-radius: var(--radius-lg);
            padding: 12px;
            box-shadow: 0 10px 24px rgba(3, 14, 33, 0.32);
        }

        .alerts-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .alerts-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #b9d2f3;
        }

        .alerts-count {
            font-size: 11px;
            font-weight: 700;
            color: #ecf5ff;
            background: rgba(40, 75, 125, 0.7);
            border: 1px solid rgba(122, 161, 223, 0.5);
            border-radius: 999px;
            padding: 3px 8px;
        }

        .alerts-actions {
            display: flex;
            gap: 6px;
        }

        .alert-action-btn {
            border: 1px solid rgba(117, 151, 206, 0.5);
            background: rgba(20, 38, 66, 0.9);
            color: #dceaff;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 8px;
            cursor: pointer;
        }

        .alert-action-btn:hover {
            border-color: #8cdcff;
        }

        .alerts-feed {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .alerts-feed::-webkit-scrollbar {
            width: 5px;
        }

        .alerts-feed::-webkit-scrollbar-thumb {
            background: rgba(121, 154, 204, 0.7);
            border-radius: 3px;
        }

        .alert-item {
            border-left: 3px solid transparent;
            border-radius: 10px;
            padding: 8px 10px;
            background: rgba(14, 24, 40, 0.88);
            border: 1px solid rgba(92, 122, 170, 0.34);
        }

        .alert-item.critical {
            border-left-color: #f6686a;
        }

        .alert-item.warning {
            border-left-color: #ffc562;
        }

        .alert-item.info {
            border-left-color: #6ec8ff;
        }

        .alert-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .alert-title {
            font-size: 12px;
            font-weight: 700;
            color: #e7f2ff;
        }

        .alert-time {
            font-size: 10px;
            color: #95accc;
            font-family: 'JetBrains Mono', monospace;
        }

        .alert-message {
            font-size: 11px;
            color: #bdd0eb;
            line-height: 1.35;
        }

        .alerts-empty {
            font-size: 11px;
            color: #9eb5d9;
            padding: 10px;
            border: 1px dashed rgba(113, 147, 201, 0.36);
            border-radius: 10px;
            background: rgba(10, 20, 34, 0.8);
            text-align: center;
        }

        .logistics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 6px;
        }

        .kpi-chip {
            border: 1px solid rgba(107, 141, 193, 0.34);
            border-radius: 10px;
            padding: 8px;
            background: rgba(11, 23, 40, 0.84);
        }

        .kpi-chip-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #97b0d5;
            margin-bottom: 3px;
            font-weight: 700;
        }

        .kpi-chip-value {
            font-size: 13px;
            color: #e8f2ff;
            font-weight: 700;
        }

        .kpi-chip-value.ok {
            color: #66e4a1;
        }

        .kpi-chip-value.warn {
            color: #ffd07a;
        }

        .kpi-chip-value.danger {
            color: #ff8d8f;
        }

        .workflow-bar {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
            margin-top: 8px;
        }

        .workflow-step {
            border-radius: 8px;
            border: 1px solid rgba(102, 136, 188, 0.38);
            background: rgba(10, 20, 37, 0.75);
            color: #8ea8cf;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            padding: 6px 4px;
            letter-spacing: 0.03em;
        }

        .workflow-step.active {
            background: linear-gradient(145deg, rgba(27, 116, 223, 0.36) 0%, rgba(16, 165, 196, 0.34) 100%);
            color: #e6f5ff;
            border-color: rgba(122, 195, 255, 0.72);
        }

        .workflow-step.done {
            background: rgba(18, 122, 82, 0.3);
            color: #b9f3da;
            border-color: rgba(72, 200, 142, 0.58);
        }

        .workflow-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .workflow-btn {
            border: 1px solid rgba(118, 153, 208, 0.44);
            background: rgba(18, 36, 61, 0.88);
            color: #dceaff;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .workflow-btn:hover {
            border-color: #88dbff;
        }

        .form-section > *:last-child,
        .location-block:last-child,
        .details-grid:last-child {
            margin-bottom: 0;
        }

        .plan-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(12, 158, 181, 0.45);
        }

        .plan-button:active {
            transform: translateY(0);
        }

        .plan-button.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Display */
        .results-container {
            display: none;
        }

        .results-container.show {
            display: block;
        }

        .results-card {
            background: linear-gradient(130deg, rgba(18, 34, 59, 0.92) 0%, rgba(13, 28, 49, 0.95) 100%);
            border: 1px solid rgba(113, 145, 197, 0.26);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 10px 24px rgba(3, 14, 33, 0.38);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .results-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(3, 14, 33, 0.45);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 12.5px;
        }

        .result-item:not(:last-child) {
            border-bottom: 1px solid rgba(101, 123, 166, 0.3);
        }

        .result-label {
            color: #9ab1d8;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .result-value {
            font-weight: 700;
            color: #e7f0ff;
            font-size: 14px;
        }

        .result-value.critical { color: #dc2626; }
        .result-value.high { color: #ea580c; }
        .result-value.moderate { color: #eab308; }
        .result-value.low { color: #16a34a; }

        /* Agent Decision Card */
        .agent-decision {
            border-radius: 12px;
            padding: 14px;
            color: white;
            margin-bottom: 14px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 10px 24px rgba(8, 19, 31, 0.24);
        }

        .agent-decision.critical {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
        }

        .agent-decision.high {
            background: linear-gradient(135deg, #ea580c 0%, #b45309 100%);
        }

        .agent-decision.moderate {
            background: linear-gradient(135deg, #eab308 0%, #a16207 100%);
        }

        .agent-decision.low {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
        }

        .agent-title {
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .agent-message {
            font-size: 12px;
            opacity: 0.95;
            margin-bottom: 6px;
        }

        .agent-meta {
            font-size: 11px;
            opacity: 0.85;
        }

        .traffic-card {
            border: 1px solid rgba(91, 122, 176, 0.35);
            background: linear-gradient(140deg, rgba(18, 34, 58, 0.96) 0%, rgba(14, 28, 48, 0.96) 100%);
        }

        .traffic-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .traffic-title {
            font-size: 12px;
            font-weight: 700;
            color: #d6e6ff;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .traffic-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid transparent;
            letter-spacing: 0.02em;
        }

        .traffic-badge.light {
            color: #0f5132;
            background: #d1fae5;
            border-color: #6ee7b7;
        }

        .traffic-badge.moderate {
            color: #713f12;
            background: #fef3c7;
            border-color: #fcd34d;
        }

        .traffic-badge.heavy {
            color: #7c2d12;
            background: #ffedd5;
            border-color: #fdba74;
        }

        .traffic-badge.severe {
            color: #7f1d1d;
            background: #fee2e2;
            border-color: #fca5a5;
        }

        /* Routes List */
        .routes-list {
            display: none;
        }

        .routes-list.show {
            display: block;
        }

        .route-item {
            background: linear-gradient(180deg, rgba(21, 34, 59, 0.94) 0%, rgba(16, 26, 45, 0.94) 100%);
            border: 1px solid #38588b;
            border-radius: 13px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            will-change: transform, opacity;
            box-shadow: inset 0 1px 0 rgba(185, 215, 255, 0.06);
        }

        .route-item:hover {
            border-color: #70c6ff;
            transform: translateY(-1px);
        }

        .route-item.primary {
            border-color: #2ec0ff;
            background: linear-gradient(135deg, rgba(24, 131, 224, 0.24) 0%, rgba(31, 184, 205, 0.2) 100%);
        }

        .route-item.selected {
            border: 2px solid #ffb23f;
            background: linear-gradient(135deg, rgba(253, 178, 68, 0.2) 0%, rgba(242, 137, 44, 0.14) 100%);
            box-shadow: 0 8px 18px rgba(248, 169, 58, 0.28);
            transform: scale(1.02);
        }

        .route-item.dimmed {
            opacity: 0.35;
            border-color: #6a7ea2;
            cursor: not-allowed;
        }

        .route-item.dimmed:hover {
            border-color: #6a7ea2;
            background: linear-gradient(180deg, rgba(21, 34, 59, 0.94) 0%, rgba(16, 26, 45, 0.94) 100%);
        }

        .route-header {
            font-weight: 700;
            color: #deebff;
            margin-bottom: 6px;
            font-size: 13px;
            letter-spacing: 0.01em;
        }

        .route-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
            color: #9fb4da;
        }

        /* ===== ROUTE VISUALIZATION STYLES ===== */
        .route-primary {
            filter: drop-shadow(0 2px 4px rgba(249, 115, 22, 0.3));
        }

        .route-alternate {
            filter: drop-shadow(0 1px 2px rgba(244, 114, 182, 0.2));
        }

        .route-label {
            z-index: 501 !important;
        }

        .route-label-primary {
            z-index: 502 !important;
        }

        .route-arrow {
            z-index: 450 !important;
            opacity: 0.6;
        }

        .route-arrow-primary {
            z-index: 451 !important;
            opacity: 0.8;
        }

        .pickup-marker {
            z-index: 600 !important;
        }

        .dest-marker {
            z-index: 600 !important;
        }

        /* ===== RIGHT PANEL - MAP ===== */
        .right-panel {
            background: #0f1a2f;
            position: relative;
            overflow: hidden;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(8, 17, 33, 0.12) 0%, rgba(8, 17, 33, 0.42) 100%);
            z-index: 250;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #0f1a2f;
            filter: saturate(1.08) contrast(1.02);
        }

        .leaflet-control-zoom {
            border: 1px solid rgba(81, 120, 173, 0.62) !important;
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(7, 20, 40, 0.35) !important;
        }

        .leaflet-control-zoom a {
            background: linear-gradient(180deg, rgba(18, 34, 57, 0.92) 0%, rgba(12, 26, 46, 0.94) 100%) !important;
            color: #d8e9ff !important;
            border-bottom: 1px solid rgba(79, 111, 163, 0.55) !important;
        }

        .leaflet-control-zoom a:hover {
            background: linear-gradient(180deg, rgba(32, 66, 110, 0.92) 0%, rgba(18, 44, 80, 0.94) 100%) !important;
            color: #ffffff !important;
        }

        .map-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            color: #9bb0d8;
            gap: 15px;
            background: linear-gradient(135deg, #0b1220 0%, #152447 100%);
        }

        .map-placeholder.hidden {
            display: none;
        }

        .map-placeholder i {
            font-size: 54px;
            opacity: 0.4;
        }

        .map-placeholder p {
            font-size: 15px;
            font-weight: 500;
        }

        #startNavBtn,
        #stopNavBtn {
            text-align: center;
            margin-bottom: 0;
        }

        #navStatus {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(96, 136, 198, 0.36);
            background: rgba(8, 20, 39, 0.72);
            color: #9fc1eb !important;
            font-weight: 600;
            line-height: 1.4;
        }

        #trafficMode {
            accent-color: #1fd88b;
        }

        /* Responsive */
        @media (max-width: 1180px) {
            .app-container {
                grid-template-columns: 390px 1fr;
            }

            .panel-header {
                padding: 24px 18px;
            }

            .panel-header p {
                font-size: 11px;
            }
        }

        @media (max-width: 920px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .left-panel {
                max-height: 54vh;
                overflow-y: auto;
            }

            .right-panel {
                min-height: 46vh;
            }
        }

        @media (max-width: 680px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            .left-panel {
                max-height: 58vh;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }

            .location-coords {
                grid-template-columns: 1fr;
            }

            .panel-content {
                padding: 12px;
            }

            .form-section {
                padding: 12px;
            }
        }

        /* No selection */
        .no-select {
            user-select: none;
        }

        .toast-stack {
            position: fixed;
            right: 16px;
            top: 16px;
            z-index: 2200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: min(380px, calc(100vw - 28px));
            pointer-events: none;
        }

        .alert-toast {
            pointer-events: auto;
            border-radius: 12px;
            border: 1px solid rgba(124, 164, 224, 0.36);
            background: rgba(7, 20, 38, 0.95);
            color: #e8f3ff;
            padding: 10px 12px;
            box-shadow: 0 10px 24px rgba(2, 10, 24, 0.52);
            animation: toastIn 0.2s ease;
        }

        .alert-toast.critical {
            border-color: rgba(246, 103, 104, 0.6);
            box-shadow: 0 10px 24px rgba(112, 19, 20, 0.4);
        }

        .alert-toast.warning {
            border-color: rgba(255, 197, 98, 0.64);
            box-shadow: 0 10px 24px rgba(126, 82, 9, 0.35);
        }

        .alert-toast.info {
            border-color: rgba(110, 200, 255, 0.58);
        }

        .alert-toast-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .alert-toast-message {
            font-size: 11px;
            color: #c4d8f2;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="panel-header">
                <h1>TMS Pro</h1>
                <p>AI-Powered Route & Delay Optimization</p>
            </div>

            <div class="panel-content">
                <!-- Pickup Location -->
                <div class="form-section">
                    <div class="form-section-title">📍 Pickup Location</div>
                    <button class="map-select-btn" id="pickupMapSelectBtn" onclick="enableMapSelection('pickup')">
                        Click to Select on Map
                    </button>
                    
                    <div class="location-block">
                        <label class="location-label">Coordinates</label>
                        <div class="location-coords">
                            <input type="number" id="pickupLat" class="coord-input" placeholder="Latitude" step="0.0001" />
                            <input type="number" id="pickupLon" class="coord-input" placeholder="Longitude" step="0.0001" />
                        </div>
                    </div>

                </div>

                <!-- Destination Location -->
                <div class="form-section">
                    <div class="form-section-title">🎯 Destination</div>
                    <button class="map-select-btn" id="destMapSelectBtn" onclick="enableMapSelection('dest')">
                        Click to Select on Map
                    </button>
                    
                    <div class="location-block">
                        <label class="location-label">Coordinates</label>
                        <div class="location-coords">
                            <input type="number" id="destLat" class="coord-input" placeholder="Latitude" step="0.0001" />
                            <input type="number" id="destLon" class="coord-input" placeholder="Longitude" step="0.0001" />
                        </div>
                    </div>

                </div>

                <!-- Trip Information -->
                <div class="form-section">
                    <div class="form-section-title">ℹ️ Trip Information</div>
                    
                    <div class="details-grid">
                        <div class="detail-field">
                            <label>Taxi ID</label>
                            <input type="number" id="taxiId" value="20000589" />
                        </div>
                        <div class="detail-field">
                            <label>Call Type</label>
                            <select id="callType">
                                <option value="A">Street Hail</option>
                                <option value="B">Dispatch</option>
                            </select>
                        </div>
                    </div>

                    <div class="details-grid">
                        <div class="detail-field">
                            <label>Temperature (°C)</label>
                            <input type="number" id="temp" value="22" />
                        </div>
                        <div class="detail-field">
                            <label>Precipitation (mm)</label>
                            <input type="number" id="precip" value="0" />
                        </div>
                    </div>

                    <div class="details-grid">
                        <div class="detail-field">
                            <label>Wind Speed (km/h)</label>
                            <input type="number" id="wind" value="5" />
                        </div>
                        <div class="detail-field">
                            <label>Strategy</label>
                            <select id="strategy">
                                <option value="balanced">Balanced</option>
                                <option value="fastest">Fastest</option>
                                <option value="safest">Safest</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">📦 Logistics Operations</div>

                    <div class="details-grid">
                        <div class="detail-field">
                            <label>Shipment ID</label>
                            <input type="text" id="shipmentId" value="SHP-10027" />
                        </div>
                        <div class="detail-field">
                            <label>Service Level</label>
                            <select id="serviceLevel">
                                <option value="standard">Standard</option>
                                <option value="express">Express</option>
                                <option value="same_day">Same Day</option>
                            </select>
                        </div>
                    </div>

                    <div class="details-grid">
                        <div class="detail-field">
                            <label>Cargo Type</label>
                            <select id="cargoType">
                                <option value="parcel">Parcel</option>
                                <option value="fragile">Fragile</option>
                                <option value="cold_chain">Cold Chain</option>
                                <option value="bulk">Bulk</option>
                            </select>
                        </div>
                        <div class="detail-field">
                            <label>Stops</label>
                            <input type="number" id="stopCount" value="1" min="1" max="8" />
                        </div>
                    </div>

                    <div class="details-grid">
                        <div class="detail-field">
                            <label>Load Weight (kg)</label>
                            <input type="number" id="loadWeight" value="320" min="1" />
                        </div>
                        <div class="detail-field">
                            <label>Vehicle Capacity (kg)</label>
                            <input type="number" id="vehicleCapacity" value="900" min="1" />
                        </div>
                    </div>

                    <div class="detail-field">
                        <label>Promised Delivery Time</label>
                        <input type="datetime-local" id="promisedBy" />
                    </div>
                </div>

                <!-- Plan Trip Button -->
                <button class="plan-button" id="planBtn" onclick="planTrip()">
                    <i class="fas fa-play"></i> Plan Trip
                </button>

                <div class="action-grid">
                    <button class="map-select-btn" id="startNavBtn" onclick="startNavigation()">
                        Start Navigation
                    </button>
                    <button class="map-select-btn" id="stopNavBtn" onclick="stopNavigation()" disabled>
                        Stop Navigation
                    </button>
                </div>

                <div class="location-block nav-settings">
                    <label class="location-label">
                        <input type="checkbox" id="trafficMode" checked /> Traffic-Aware ETA (beta)
                    </label>
                    <div id="navStatus" style="font-size: 12px; color: #a8b5d1; margin-top: 6px;">
                        Navigation inactive
                    </div>
                </div>

                <div class="alerts-panel">
                    <div class="alerts-head">
                        <div class="alerts-title">Operational Alerts</div>
                        <div class="alerts-actions">
                            <span id="alertsCount" class="alerts-count">0</span>
                            <button class="alert-action-btn" onclick="clearAlerts()">Clear</button>
                        </div>
                    </div>
                    <div id="alertsContainer" class="alerts-feed">
                        <div class="alerts-empty">No alerts yet. Alerts will appear during planning and live navigation.</div>
                    </div>
                </div>

                <!-- Results Container -->
                <div id="resultsContainer" class="results-container"></div>

                <!-- Routes Container -->
                <div id="routesContainer" class="routes-list"></div>
            </div>
        </div>

        <!-- RIGHT PANEL - MAP -->
        <div class="right-panel">
            <div id="map"></div>
            <div class="map-placeholder" id="mapPlaceholder">
                <i class="fas fa-map"></i>
                <p>Enter coordinates and plan trip to view route</p>
            </div>
        </div>
    </div>

    <div id="toastStack" class="toast-stack"></div>

    <script>
        let map;
        let pickupMarker, destMarker;
        let routeLayers = [];
        let currentTrip = null;
        let selectedRouteIndex = 0;
        let currentTripData = null;
        let mapSelectionMode = null;
        let navWatchId = null;
        let navMarker = null;
        let navigationActive = false;
        let lastRerouteAtMs = 0;
        let lastTrafficRefreshAtMs = 0;
        const rerouteCooldownMs = 30000;
        const trafficRefreshIntervalMs = 45000;
        let alertFeed = [];
        const maxAlertItems = 20;
        const recentAlertKeys = new Map();
        const logisticsStages = ['assigned', 'at_pickup', 'picked_up', 'in_transit', 'delivered'];
        const logisticsStageLabel = {
            assigned: 'Assigned',
            at_pickup: 'At Pickup',
            picked_up: 'Picked Up',
            in_transit: 'In Transit',
            delivered: 'Delivered'
        };
        let deliveryStage = 'assigned';
        let trafficDiagnostics = {
            connected: false,
            keyConfigured: null,
            message: 'Traffic integration not checked yet.'
        };

        // ===== MAP INITIALIZATION =====
        function initMap() {
            const mapContainer = document.getElementById('map');
            
            // Initialize Leaflet map (Lisbon: 38.7223, -9.1393)
            map = L.map('map').setView([38.7223, -9.1393], 12);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            // Click on map to set pickup/destination when selector is active
            map.on('click', handleMapClick);

            // Probe traffic backend once so the UI can show actionable status.
            probeTrafficIntegration();
            renderAlertFeed();
            initializeLogisticsDefaults();
        }

        function initializeLogisticsDefaults() {
            const promisedInput = document.getElementById('promisedBy');
            if (promisedInput && !promisedInput.value) {
                const target = new Date(Date.now() + 90 * 60000);
                promisedInput.value = toDateTimeLocalValue(target);
            }
        }

        function toDateTimeLocalValue(date) {
            const d = date instanceof Date ? date : new Date();
            const pad = (v) => String(v).padStart(2, '0');
            const year = d.getFullYear();
            const month = pad(d.getMonth() + 1);
            const day = pad(d.getDate());
            const hours = pad(d.getHours());
            const mins = pad(d.getMinutes());
            return `${year}-${month}-${day}T${hours}:${mins}`;
        }

        function getLogisticsInput() {
            const shipmentId = (document.getElementById('shipmentId')?.value || 'SHP-UNSET').trim() || 'SHP-UNSET';
            const serviceLevel = document.getElementById('serviceLevel')?.value || 'standard';
            const cargoType = document.getElementById('cargoType')?.value || 'parcel';
            const stopCount = Math.max(1, Number.parseInt(document.getElementById('stopCount')?.value || '1', 10) || 1);
            const loadWeight = Math.max(0, Number.parseFloat(document.getElementById('loadWeight')?.value || '0') || 0);
            const vehicleCapacity = Math.max(1, Number.parseFloat(document.getElementById('vehicleCapacity')?.value || '1') || 1);
            const promisedByRaw = document.getElementById('promisedBy')?.value || '';
            const promisedBy = promisedByRaw ? new Date(promisedByRaw) : null;

            return {
                shipmentId,
                serviceLevel,
                cargoType,
                stopCount,
                loadWeight,
                vehicleCapacity,
                promisedBy
            };
        }

        function computeLogisticsSnapshot(data, context, ops = null) {
            const logistics = ops || getLogisticsInput();
            const delayProb = Number(data?.delay_probability || 0);
            const baseMin = Number(data?.primary_route?.estimated_time_min || 0);
            const eta = computeAdjustedEta(baseMin, delayProb, context);
            const etaAt = new Date(Date.now() + eta.adjustedTimeMin * 60000);
            const promised = logistics.promisedBy instanceof Date && !Number.isNaN(logistics.promisedBy.getTime())
                ? logistics.promisedBy
                : null;

            let slaStatus = 'untracked';
            let slackMin = null;
            if (promised) {
                slackMin = (promised.getTime() - etaAt.getTime()) / 60000;
                if (slackMin < 0) slaStatus = 'breach';
                else if (slackMin < 20) slaStatus = 'at_risk';
                else slaStatus = 'on_track';
            }

            const utilization = clamp((logistics.loadWeight / Math.max(logistics.vehicleCapacity, 1)) * 100, 0, 200);
            const serviceBase = logistics.serviceLevel === 'same_day' ? 85 : logistics.serviceLevel === 'express' ? 70 : 55;
            const slaBoost = slaStatus === 'breach' ? 20 : slaStatus === 'at_risk' ? 10 : 0;
            const utilBoost = utilization >= 90 ? 8 : utilization >= 75 ? 4 : 0;
            const dispatchPriority = clamp(Math.round(serviceBase + delayProb * 25 + slaBoost + utilBoost), 1, 99);

            return {
                etaAt,
                promised,
                slaStatus,
                slackMin,
                utilization,
                dispatchPriority,
                ops: logistics,
                adjustedEtaMin: eta.adjustedTimeMin
            };
        }

        function slaClass(status) {
            if (status === 'breach') return 'danger';
            if (status === 'at_risk') return 'warn';
            if (status === 'on_track') return 'ok';
            return '';
        }

        function formatShortTime(d) {
            if (!(d instanceof Date) || Number.isNaN(d.getTime())) return 'N/A';
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function stageIndex(stage) {
            const idx = logisticsStages.indexOf(stage);
            return idx >= 0 ? idx : 0;
        }

        function renderLogisticsSection(data, context) {
            const snap = computeLogisticsSnapshot(data, context);
            const activeIdx = stageIndex(deliveryStage);
            const slaText = snap.slaStatus === 'breach'
                ? 'SLA Breach'
                : snap.slaStatus === 'at_risk'
                    ? 'SLA At Risk'
                    : snap.slaStatus === 'on_track'
                        ? 'On Track'
                        : 'Not Tracked';

            const slackText = snap.slackMin === null
                ? 'N/A'
                : `${snap.slackMin >= 0 ? '+' : ''}${snap.slackMin.toFixed(0)} min`;

            const utilClass = snap.utilization >= 95 ? 'danger' : snap.utilization >= 80 ? 'warn' : 'ok';

            const workflow = logisticsStages.map((step, idx) => {
                const stepClass = idx < activeIdx ? 'done' : idx === activeIdx ? 'active' : '';
                return `<div class="workflow-step ${stepClass}">${logisticsStageLabel[step]}</div>`;
            }).join('');

            return `
                <div class="results-card">
                    <div class="traffic-head">
                        <div class="traffic-title">Logistics Operations</div>
                        <div class="traffic-badge ${snap.slaStatus === 'breach' ? 'severe' : snap.slaStatus === 'at_risk' ? 'heavy' : 'light'}">${slaText}</div>
                    </div>
                    <div class="logistics-grid">
                        <div class="kpi-chip">
                            <div class="kpi-chip-label">Shipment</div>
                            <div class="kpi-chip-value">${snap.ops.shipmentId}</div>
                        </div>
                        <div class="kpi-chip">
                            <div class="kpi-chip-label">Service Level</div>
                            <div class="kpi-chip-value">${snap.ops.serviceLevel.replace('_', ' ').toUpperCase()}</div>
                        </div>
                        <div class="kpi-chip">
                            <div class="kpi-chip-label">Dispatch Priority</div>
                            <div class="kpi-chip-value ${snap.dispatchPriority >= 90 ? 'danger' : snap.dispatchPriority >= 75 ? 'warn' : ''}">${snap.dispatchPriority}/99</div>
                        </div>
                        <div class="kpi-chip">
                            <div class="kpi-chip-label">Load Utilization</div>
                            <div class="kpi-chip-value ${utilClass}">${snap.utilization.toFixed(0)}%</div>
                        </div>
                        <div class="kpi-chip">
                            <div class="kpi-chip-label">ETA Window</div>
                            <div class="kpi-chip-value">${formatShortTime(snap.etaAt)}</div>
                        </div>
                        <div class="kpi-chip">
                            <div class="kpi-chip-label">SLA Slack</div>
                            <div class="kpi-chip-value ${slaClass(snap.slaStatus)}">${slackText}</div>
                        </div>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Cargo Type</span>
                        <span class="result-value">${snap.ops.cargoType.replace('_', ' ')}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Planned Stops</span>
                        <span class="result-value">${snap.ops.stopCount}</span>
                    </div>
                    <div class="workflow-bar">${workflow}</div>
                    <div class="workflow-actions">
                        <button class="workflow-btn" onclick="setDeliveryStage('at_pickup')">At Pickup</button>
                        <button class="workflow-btn" onclick="setDeliveryStage('picked_up')">Picked Up</button>
                        <button class="workflow-btn" onclick="setDeliveryStage('in_transit')">In Transit</button>
                        <button class="workflow-btn" onclick="setDeliveryStage('delivered')">Delivered</button>
                    </div>
                </div>
            `;
        }

        function setDeliveryStage(stage) {
            if (!logisticsStages.includes(stage)) return;
            deliveryStage = stage;

            const message = `Shipment stage changed to ${logisticsStageLabel[stage]}.`;
            addAlert('info', 'Workflow Update', message);

            if (stage === 'delivered') {
                addAlert('info', 'Delivery Completed', 'Shipment marked delivered. Capture POD in downstream workflow.');
            }

            if (currentTripData) {
                displayResults(currentTripData);
            } else if (currentTrip) {
                displayResults(currentTrip);
            }
        }

        function alertKey(level, title, message) {
            return `${level}|${title}|${message}`;
        }

        function addAlert(level, title, message) {
            const normalizedLevel = ['critical', 'warning', 'info'].includes(level) ? level : 'info';
            const key = alertKey(normalizedLevel, title, message);
            const now = Date.now();
            const previous = recentAlertKeys.get(key) || 0;

            // Avoid flooding repeated alerts during live tracking loops.
            if (now - previous < 35000) return;
            recentAlertKeys.set(key, now);

            const item = {
                id: now,
                level: normalizedLevel,
                title,
                message,
                createdAt: new Date().toLocaleTimeString()
            };

            alertFeed.unshift(item);
            if (alertFeed.length > maxAlertItems) {
                alertFeed = alertFeed.slice(0, maxAlertItems);
            }

            renderAlertFeed();
            showToast(item);
        }

        function renderAlertFeed() {
            const container = document.getElementById('alertsContainer');
            const countNode = document.getElementById('alertsCount');
            if (!container || !countNode) return;

            countNode.textContent = String(alertFeed.length);

            if (!alertFeed.length) {
                container.innerHTML = '<div class="alerts-empty">No alerts yet. Alerts will appear during planning and live navigation.</div>';
                return;
            }

            container.innerHTML = alertFeed
                .map(a => `
                    <div class="alert-item ${a.level}">
                        <div class="alert-head">
                            <div class="alert-title">${a.title}</div>
                            <div class="alert-time">${a.createdAt}</div>
                        </div>
                        <div class="alert-message">${a.message}</div>
                    </div>
                `)
                .join('');
        }

        function clearAlerts() {
            alertFeed = [];
            renderAlertFeed();
        }

        function showToast(alertItem) {
            const stack = document.getElementById('toastStack');
            if (!stack) return;

            const node = document.createElement('div');
            node.className = `alert-toast ${alertItem.level}`;
            node.innerHTML = `
                <div class="alert-toast-title">${alertItem.title}</div>
                <div class="alert-toast-message">${alertItem.message}</div>
            `;
            stack.prepend(node);

            setTimeout(() => {
                node.remove();
            }, 4500);

            while (stack.children.length > 4) {
                stack.removeChild(stack.lastChild);
            }
        }

        async function probeTrafficIntegration() {
            try {
                const resp = await fetch('/traffic/health');
                if (!resp.ok) {
                    if (resp.status === 404) {
                        trafficDiagnostics = {
                            connected: false,
                            keyConfigured: null,
                            message: 'Traffic API routes not loaded. Restart server to apply latest backend changes.'
                        };
                        return;
                    }

                    trafficDiagnostics = {
                        connected: false,
                        keyConfigured: null,
                        message: `Traffic health check failed (${resp.status}).`
                    };
                    return;
                }

                const data = await resp.json();
                const keyConfigured = Boolean(data?.key_configured);
                trafficDiagnostics = {
                    connected: true,
                    keyConfigured,
                    message: keyConfigured
                        ? 'TomTom live traffic connected.'
                        : 'TomTom key missing. Set TOMTOM_API_KEY and restart server.'
                };
            } catch (e) {
                trafficDiagnostics = {
                    connected: false,
                    keyConfigured: null,
                    message: 'Traffic health endpoint unreachable.'
                };
            }
        }

        function enableMapSelection(mode) {
            mapSelectionMode = mode;
            const pickupBtn = document.getElementById('pickupMapSelectBtn');
            const destBtn = document.getElementById('destMapSelectBtn');

            pickupBtn.classList.toggle('active', mode === 'pickup');
            destBtn.classList.toggle('active', mode === 'dest');
        }

        function handleMapClick(e) {
            if (!mapSelectionMode) return;

            const lat = Number(e.latlng.lat.toFixed(6));
            const lon = Number(e.latlng.lng.toFixed(6));

            if (mapSelectionMode === 'pickup') {
                document.getElementById('pickupLat').value = lat;
                document.getElementById('pickupLon').value = lon;
                updatePickupMarker();
            } else if (mapSelectionMode === 'dest') {
                document.getElementById('destLat').value = lat;
                document.getElementById('destLon').value = lon;
                updateDestMarker();
            }

            // Auto-exit selection mode after one click
            mapSelectionMode = null;
            document.getElementById('pickupMapSelectBtn').classList.remove('active');
            document.getElementById('destMapSelectBtn').classList.remove('active');
        }

        function normalizeCoordinates(coords, startPoint = null, endPoint = null) {
            if (!Array.isArray(coords)) return [];

            const raw = coords.filter(c => Array.isArray(c) && c.length >= 2 && Number.isFinite(c[0]) && Number.isFinite(c[1]));
            if (!raw.length) return [];

            const asLatLon = raw.map(c => [Number(c[0]), Number(c[1])]).filter(c => isValidLatLon(c[0], c[1]));
            const asLonLat = raw.map(c => [Number(c[1]), Number(c[0])]).filter(c => isValidLatLon(c[0], c[1]));

            const candidates = [];
            if (asLatLon.length) {
                candidates.push(asLatLon);
                candidates.push([...asLatLon].reverse());
            }
            if (asLonLat.length) {
                candidates.push(asLonLat);
                candidates.push([...asLonLat].reverse());
            }

            if (!candidates.length) return [];
            if (!startPoint || !endPoint) return candidates[0];

            const scoreCandidate = (candidate) => {
                const first = candidate[0];
                const last = candidate[candidate.length - 1];
                return (
                    haversineKm(startPoint[0], startPoint[1], first[0], first[1]) +
                    haversineKm(endPoint[0], endPoint[1], last[0], last[1])
                );
            };

            let best = candidates[0];
            let bestScore = scoreCandidate(best);

            for (let i = 1; i < candidates.length; i += 1) {
                const s = scoreCandidate(candidates[i]);
                if (s < bestScore) {
                    best = candidates[i];
                    bestScore = s;
                }
            }

            return best;
        }

        function isValidLatLon(lat, lon) {
            return Number.isFinite(lat) && Number.isFinite(lon) && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180;
        }

        function haversineKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const toRad = (d) => (d * Math.PI) / 180;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getRouteBySelection(data, routeIndex) {
            if (!data?.primary_route?.coordinates?.length) return null;
            if (routeIndex === 0) return data.primary_route;
            const alt = data.alternate_routes?.[routeIndex - 1];
            return alt?.coordinates?.length ? alt : data.primary_route;
        }

        function nearestPointOnSegment(pLat, pLon, aLat, aLon, bLat, bLon) {
            const x = pLon;
            const y = pLat;
            const x1 = aLon;
            const y1 = aLat;
            const x2 = bLon;
            const y2 = bLat;

            const dx = x2 - x1;
            const dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) {
                return { lat: aLat, lon: aLon, t: 0 };
            }

            const t = clamp(((x - x1) * dx + (y - y1) * dy) / lenSq, 0, 1);
            return {
                lat: y1 + t * dy,
                lon: x1 + t * dx,
                t
            };
        }

        function computeRouteProgress(routeCoords, userLat, userLon) {
            if (!Array.isArray(routeCoords) || routeCoords.length < 2) {
                return {
                    nearestDistanceKm: Infinity,
                    remainingKm: 0,
                    nearestIndex: 0,
                    nearestPoint: null
                };
            }

            let best = {
                nearestDistanceKm: Infinity,
                remainingKm: 0,
                nearestIndex: 0,
                nearestPoint: null
            };

            for (let i = 0; i < routeCoords.length - 1; i += 1) {
                const a = routeCoords[i];
                const b = routeCoords[i + 1];
                const np = nearestPointOnSegment(userLat, userLon, a[0], a[1], b[0], b[1]);
                const distKm = haversineKm(userLat, userLon, np.lat, np.lon);

                if (distKm < best.nearestDistanceKm) {
                    let remaining = haversineKm(np.lat, np.lon, b[0], b[1]);
                    for (let j = i + 1; j < routeCoords.length - 1; j += 1) {
                        remaining += haversineKm(routeCoords[j][0], routeCoords[j][1], routeCoords[j + 1][0], routeCoords[j + 1][1]);
                    }

                    best = {
                        nearestDistanceKm: distKm,
                        remainingKm: remaining,
                        nearestIndex: i,
                        nearestPoint: [np.lat, np.lon]
                    };
                }
            }

            return best;
        }

        function estimateTrafficFactor(data, context, currentSpeedKph = null) {
            const liveFactor = Number(data?.live_traffic?.congestion_factor || 0);
            if (liveFactor > 1) {
                return clamp(liveFactor, 1, 2.2);
            }

            const delayProb = Number(data?.delay_probability || 0);
            const precip = Number(context?.precipitation || 0);
            const wind = Number(context?.windspeed || 0);
            const hour = Number(context?.hour ?? new Date().getHours());
            const rush = (hour >= 8 && hour <= 10) || (hour >= 17 && hour <= 19);
            let factor = 1 + delayProb * 0.22;
            if (rush) factor += 0.12;
            if (precip >= 2) factor += 0.10;
            if (wind >= 12) factor += 0.04;

            if (Number.isFinite(currentSpeedKph) && currentSpeedKph > 0 && currentSpeedKph < 18) {
                factor += 0.12;
            }

            return clamp(factor, 1, 1.8);
        }

        async function fetchTomTomRouteTrafficSummary(routeCoords) {
            if (!Array.isArray(routeCoords) || routeCoords.length < 2) return null;

            const resp = await fetch('/traffic/route-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ coordinates: routeCoords })
            });

            if (!resp.ok) {
                if (resp.status === 404) {
                    trafficDiagnostics.message = 'Traffic endpoint missing (404). Restart backend server.';
                } else if (resp.status === 503) {
                    trafficDiagnostics.message = 'TomTom key not configured on server.';
                } else {
                    trafficDiagnostics.message = `Live traffic unavailable (${resp.status}).`;
                }
                return null;
            }

            trafficDiagnostics.message = 'TomTom live traffic connected.';
            return await resp.json();
        }

        async function attachLiveTrafficSummary(data, routeIndex = 0) {
            if (!data) return data;
            const route = getRouteBySelection(data, routeIndex);
            const coords = route?.coordinates || [];
            const traffic = await fetchTomTomRouteTrafficSummary(coords);
            if (!traffic) return data;

            return {
                ...data,
                live_traffic: traffic
            };
        }

        function trafficLabel(traffic) {
            if (!traffic) return 'Unavailable';
            const sev = String(traffic.severity || 'moderate');
            if (sev === 'severe') return 'Severe Congestion';
            if (sev === 'heavy') return 'Heavy Traffic';
            if (sev === 'moderate') return 'Moderate Traffic';
            return 'Light Traffic';
        }

        function trafficBadgeClass(traffic) {
            const sev = String(traffic?.severity || 'moderate').toLowerCase();
            if (sev === 'severe') return 'severe';
            if (sev === 'heavy') return 'heavy';
            if (sev === 'moderate') return 'moderate';
            return 'light';
        }

        function formatTrafficTimestamp(rawTs) {
            if (!rawTs) return 'No recent live update';
            const parsed = new Date(rawTs);
            if (Number.isNaN(parsed.getTime())) return String(rawTs);
            return parsed.toLocaleString();
        }

        function setNavStatus(message) {
            const node = document.getElementById('navStatus');
            if (node) node.textContent = message;
        }

        function refreshNavigationPanel() {
            if (!navigationActive || !currentTripData) return;
            const panel = document.getElementById('navLivePanel');
            if (!panel) return;
            panel.style.display = 'block';
        }

        async function attemptOffRouteReroute(userLat, userLon) {
            const now = Date.now();
            if (now - lastRerouteAtMs < rerouteCooldownMs) return;

            const destLat = parseFloat(document.getElementById('destLat').value);
            const destLon = parseFloat(document.getElementById('destLon').value);
            if (!isValidLatLon(destLat, destLon)) return;

            lastRerouteAtMs = now;
            setNavStatus('Off-route detected. Recomputing route...');
            addAlert('warning', 'Off-Route Event', 'Vehicle deviated from corridor. Auto-reroute started.');

            document.getElementById('pickupLat').value = Number(userLat.toFixed(6));
            document.getElementById('pickupLon').value = Number(userLon.toFixed(6));
            updatePickupMarker(true);

            try {
                await planTrip();
                setNavStatus('Rerouted from current location. Navigation active.');
                addAlert('info', 'Reroute Completed', 'New route generated from live vehicle position.');
            } catch (e) {
                console.warn('Auto-reroute failed:', e);
                setNavStatus('Auto-reroute failed. Continuing current route guidance.');
                addAlert('critical', 'Reroute Failed', 'Auto-reroute failed. Manual planning may be required.');
            }
        }

        function onNavigationPosition(position) {
            if (!navigationActive) return;

            const userLat = Number(position.coords.latitude);
            const userLon = Number(position.coords.longitude);
            const speedMps = Number(position.coords.speed);
            const speedKph = Number.isFinite(speedMps) && speedMps >= 0 ? speedMps * 3.6 : null;

            if (navMarker) map.removeLayer(navMarker);
            navMarker = L.circleMarker([userLat, userLon], {
                radius: 8,
                color: '#00d3a7',
                fillColor: '#00f0be',
                fillOpacity: 0.9,
                weight: 2
            }).addTo(map).bindPopup('Live location');

            // Live tracking should work even before a destination/route is selected.
            if (!currentTripData?.primary_route?.coordinates?.length) {
                const speedTextNoRoute = Number.isFinite(speedKph) ? `${speedKph.toFixed(1)} km/h` : 'N/A';
                setNavStatus(`Live location active. Select destination on map to start route guidance. | Speed: ${speedTextNoRoute}`);
                return;
            }

            const selectedRoute = getRouteBySelection(currentTripData, selectedRouteIndex);
            const startPoint = [userLat, userLon];
            const endPoint = currentTripData?.destination
                ? [Number(currentTripData.destination.lat), Number(currentTripData.destination.lon)]
                : [parseFloat(document.getElementById('destLat').value), parseFloat(document.getElementById('destLon').value)];

            const normalizedCoords = normalizeCoordinates(selectedRoute?.coordinates || [], startPoint, endPoint);
            const progress = computeRouteProgress(normalizedCoords, userLat, userLon);
            const trafficModeOn = document.getElementById('trafficMode')?.checked;
            const baseSpeed = 28;
            const context = getCurrentTripContext();
            const trafficFactor = trafficModeOn ? estimateTrafficFactor(currentTripData, context, speedKph) : 1;
            const effectiveSpeed = Math.max(12, baseSpeed / trafficFactor);
            const remainingMin = (progress.remainingKm / effectiveSpeed) * 60;

            const now = Date.now();
            if (trafficModeOn && now - lastTrafficRefreshAtMs > trafficRefreshIntervalMs) {
                lastTrafficRefreshAtMs = now;
                const tail = normalizedCoords.slice(Math.max(0, progress.nearestIndex));
                fetchTomTomRouteTrafficSummary(tail)
                    .then((traffic) => {
                        if (!traffic || !currentTripData) return;
                        currentTripData = {
                            ...currentTripData,
                            live_traffic: traffic
                        };
                        currentTrip = currentTripData;
                        displayResults(currentTripData);
                    })
                    .catch(() => {});
            }

            const offRoute = progress.nearestDistanceKm > 0.12;
            if (offRoute) {
                attemptOffRouteReroute(userLat, userLon);
            }

            const panel = document.getElementById('navLivePanel');
            if (panel) {
                panel.style.display = 'block';
                panel.innerHTML = `
                    <div class="result-item">
                        <span class="result-label">Remaining Distance</span>
                        <span class="result-value">${progress.remainingKm.toFixed(2)} km</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Remaining ETA</span>
                        <span class="result-value">${Math.max(0, remainingMin).toFixed(1)} min</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Traffic Factor</span>
                        <span class="result-value">x${trafficFactor.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Route Deviation</span>
                        <span class="result-value">${(progress.nearestDistanceKm * 1000).toFixed(0)} m</span>
                    </div>
                `;
            }

            const speedText = Number.isFinite(speedKph) ? `${speedKph.toFixed(1)} km/h` : 'N/A';
            setNavStatus(
                offRoute
                    ? `Off-route by ${(progress.nearestDistanceKm * 1000).toFixed(0)}m. Rerouting... | Speed: ${speedText}`
                    : `Navigating on route | Remaining ${progress.remainingKm.toFixed(2)}km | Speed: ${speedText}`
            );
        }

        function onNavigationError(err) {
            console.warn('Navigation geolocation error:', err);
            setNavStatus(`Navigation error: ${err?.message || 'Unable to fetch location'}`);
            addAlert('critical', 'Navigation Signal Error', err?.message || 'Unable to fetch device location.');
        }

        function startNavigation() {
            if (!navigator.geolocation) {
                setNavStatus('Geolocation is not supported in this browser.');
                addAlert('critical', 'Geolocation Unsupported', 'Browser does not support geolocation tracking.');
                return;
            }

            if (navigationActive) {
                setNavStatus('Navigation is already active.');
                addAlert('info', 'Navigation Active', 'Navigation session is already running.');
                return;
            }

            navigationActive = true;
            document.getElementById('startNavBtn').disabled = true;
            document.getElementById('stopNavBtn').disabled = false;
            refreshNavigationPanel();
            setNavStatus('Getting current location...');
            addAlert('info', 'Navigation Started', 'Live tracking started. Waiting for current location lock.');

            // Start from the user's real location and then let user pick destination.
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = Number(position.coords.latitude.toFixed(6));
                    const userLon = Number(position.coords.longitude.toFixed(6));

                    // Reset current route state for the new trip setup flow.
                    currentTrip = null;
                    currentTripData = null;
                    routeLayers.forEach(layer => map.removeLayer(layer));
                    routeLayers = [];

                    // Set pickup to live location.
                    document.getElementById('pickupLat').value = userLat;
                    document.getElementById('pickupLon').value = userLon;
                    updatePickupMarker(true);

                    // Clear previous destination so user explicitly chooses new one.
                    document.getElementById('destLat').value = '';
                    document.getElementById('destLon').value = '';
                    if (destMarker) {
                        map.removeLayer(destMarker);
                        destMarker = null;
                    }

                    map.setView([userLat, userLon], 15, { animate: true });
                    hideMapPlaceholder();

                    // Prompt map selection for destination.
                    enableMapSelection('dest');
                    setNavStatus('Current location set. Tap on map to choose destination.');
                    addAlert('info', 'Pickup Auto-Set', 'Pickup updated from live GPS. Select destination to continue.');
                },
                (err) => {
                    onNavigationError(err);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 3000,
                    timeout: 12000
                }
            );

            navWatchId = navigator.geolocation.watchPosition(
                onNavigationPosition,
                onNavigationError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 3000,
                    timeout: 10000
                }
            );
        }

        function stopNavigation() {
            navigationActive = false;

            mapSelectionMode = null;
            document.getElementById('pickupMapSelectBtn').classList.remove('active');
            document.getElementById('destMapSelectBtn').classList.remove('active');

            if (navWatchId !== null) {
                navigator.geolocation.clearWatch(navWatchId);
                navWatchId = null;
            }

            if (navMarker) {
                map.removeLayer(navMarker);
                navMarker = null;
            }

            const panel = document.getElementById('navLivePanel');
            if (panel) {
                panel.style.display = 'none';
                panel.innerHTML = '';
            }

            document.getElementById('startNavBtn').disabled = false;
            document.getElementById('stopNavBtn').disabled = true;
            setNavStatus('Navigation stopped');
            addAlert('info', 'Navigation Stopped', 'Live tracking session closed.');
        }

        function perpendicularOffset(lat1, lon1, lat2, lon2, ratio, intensity) {
            const dx = lon2 - lon1;
            const dy = lat2 - lat1;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;

            // Unit perpendicular vector to create clearly separated detours
            const px = -dy / len;
            const py = dx / len;

            const baseLat = lat1 + (lat2 - lat1) * ratio;
            const baseLon = lon1 + (lon2 - lon1) * ratio;

            return [
                clamp(baseLat + py * intensity, -90, 90),
                clamp(baseLon + px * intensity, -180, 180)
            ];
        }

        function buildDetourCoordinates(pickupLat, pickupLon, destLat, destLon, intensityA, intensityB) {
            const p1 = perpendicularOffset(pickupLat, pickupLon, destLat, destLon, 0.33, intensityA);
            const p2 = perpendicularOffset(pickupLat, pickupLon, destLat, destLon, 0.66, intensityB);

            return [
                [pickupLat, pickupLon],
                p1,
                p2,
                [destLat, destLon]
            ];
        }

        function buildFallbackAlternatives(pickupLat, pickupLon, destLat, destLon, baseDistanceKm, baseTimeMin) {
            // Scale bend to trip length, with bounds for stable visuals.
            const dynamicBend = clamp(baseDistanceKm * 0.004, 0.01, 0.06);

            // Three clearly distinct detour families.
            const alt1Coords = buildDetourCoordinates(
                pickupLat,
                pickupLon,
                destLat,
                destLon,
                dynamicBend,
                dynamicBend * 0.75
            );

            const alt2Coords = buildDetourCoordinates(
                pickupLat,
                pickupLon,
                destLat,
                destLon,
                -dynamicBend * 1.25,
                -dynamicBend * 0.9
            );

            const alt3Coords = buildDetourCoordinates(
                pickupLat,
                pickupLon,
                destLat,
                destLon,
                dynamicBend * 1.6,
                -dynamicBend * 1.1
            );

            return [
                {
                    distance_km: baseDistanceKm * 1.08,
                    estimated_time_min: baseTimeMin * 1.1,
