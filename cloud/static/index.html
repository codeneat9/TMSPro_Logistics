<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMS Delay Prototype</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #22c55e;
      --warn: #eab308;
      --bad: #ef4444;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, #1d4ed8 0%, transparent 60%),
        radial-gradient(1000px 500px at 80% 0%, #0ea5e9 0%, transparent 55%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
      letter-spacing: 0.2px;
    }

    p.lead {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(90deg, #06b6d4, #3b82f6);
      color: #fff;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.15);
      color: var(--text);
    }

    .result-main {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 4px 0;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-right: 6px;
    }

    .ok { background: rgba(34,197,94,0.2); color: #86efac; }
    .warn { background: rgba(234,179,8,0.2); color: #fde047; }
    .bad { background: rgba(239,68,68,0.2); color: #fca5a5; }

    pre {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px;
      max-height: 240px;
      overflow: auto;
      font-size: 0.78rem;
      color: #cbd5e1;
    }

    .hint { color: var(--muted); font-size: 0.86rem; }

    @media (max-width: 920px) {
      .container { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>Delay Prediction Prototype</h1>
      <p class="lead">Raw trip input -> feature builder -> LightGBM delay prediction</p>

      <div class="grid">
        <div>
          <label>Pickup Latitude</label>
          <input id="pickup_lat" type="number" step="0.000001" value="41.141412" />
        </div>
        <div>
          <label>Pickup Longitude</label>
          <input id="pickup_lon" type="number" step="0.000001" value="-8.618643" />
        </div>
        <div>
          <label>Destination Latitude</label>
          <input id="destination_lat" type="number" step="0.000001" value="41.160000" />
        </div>
        <div>
          <label>Destination Longitude</label>
          <input id="destination_lon" type="number" step="0.000001" value="-8.640000" />
        </div>
        <div>
          <label>Pickup Timestamp (Unix)</label>
          <input id="pickup_timestamp" type="number" value="1372636858" />
        </div>
        <div>
          <label>Taxi ID</label>
          <input id="taxi_id" type="number" value="20000589" />
        </div>
        <div>
          <label>Call Type</label>
          <select id="call_type">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C" selected>C</option>
          </select>
        </div>
        <div>
          <label>Day Type</label>
          <select id="day_type">
            <option value="A" selected>A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div>
          <label>Temperature (2m)</label>
          <input id="temperature_2m" type="number" step="0.1" value="22.1" />
        </div>
        <div>
          <label>Precipitation</label>
          <input id="precipitation" type="number" step="0.1" value="0.0" />
        </div>
        <div>
          <label>Wind Speed (10m)</label>
          <input id="windspeed_10m" type="number" step="0.1" value="2.5" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="predictDelay()">Predict Delay</button>
        <button class="btn-ghost" onclick="loadRushHourRainSample()">Load Rush Hour Rain Sample</button>
      </div>
      <p class="hint">API endpoint: <code>/predict</code></p>
    </section>

    <section class="card">
      <h2 style="margin-top:0">Prediction Result</h2>
      <div id="status" class="hint">Waiting for prediction...</div>
      <div id="probability" class="result-main">--</div>
      <div id="labels"></div>

      <h3>Assumptions Used</h3>
      <pre id="assumptions">[]</pre>

      <h3>Built Features (24)</h3>
      <pre id="features">{}</pre>
    </section>
  </div>

  <script>
    function val(id) {
      return document.getElementById(id).value;
    }

    function num(id) {
      const n = Number(val(id));
      return Number.isFinite(n) ? n : null;
    }

    function loadRushHourRainSample() {
      document.getElementById('pickup_timestamp').value = '1372688400';
      document.getElementById('precipitation').value = '6.2';
      document.getElementById('temperature_2m').value = '13.4';
      document.getElementById('windspeed_10m').value = '18.0';
      document.getElementById('call_type').value = 'B';
      document.getElementById('day_type').value = 'A';
    }

    async function predictDelay() {
      const payload = {
        pickup_lat: num('pickup_lat'),
        pickup_lon: num('pickup_lon'),
        destination_lat: num('destination_lat'),
        destination_lon: num('destination_lon'),
        pickup_timestamp: Math.trunc(num('pickup_timestamp')),
        taxi_id: Math.trunc(num('taxi_id')),
        call_type: val('call_type'),
        day_type: val('day_type'),
        temperature_2m: num('temperature_2m'),
        precipitation: num('precipitation'),
        windspeed_10m: num('windspeed_10m')
      };

      document.getElementById('status').textContent = 'Predicting...';

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Prediction failed');
        }

        const prediction = data.prediction;
        const prob = prediction.delay_probability;
        const delayed = prediction.is_delayed === 1;

        document.getElementById('status').textContent = 'Prediction complete';
        document.getElementById('probability').textContent = `${(prob * 100).toFixed(2)}%`;

        const riskClass = delayed ? 'bad' : (prob > 0.35 ? 'warn' : 'ok');
        const delayPill = delayed
          ? '<span class="pill bad">Likely Delayed</span>'
          : '<span class="pill ok">Likely On-Time</span>';

        const conf = prediction.confidence || 'medium';
        const confClass = conf === 'high' ? 'ok' : conf === 'medium' ? 'warn' : 'bad';
        const confPill = `<span class="pill ${confClass}">Confidence: ${conf}</span>`;

        document.getElementById('labels').innerHTML = delayPill + confPill + `<span class="pill ${riskClass}">Threshold: ${prediction.threshold_used.toFixed(2)}</span>`;
        document.getElementById('assumptions').textContent = JSON.stringify(data.assumptions, null, 2);
        document.getElementById('features').textContent = JSON.stringify(data.features, null, 2);
      } catch (err) {
        document.getElementById('status').textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
