version: "3.9"

services:
  tms-dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: embedded-tms-ai:prod
    container_name: embedded-tms-ai-prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s